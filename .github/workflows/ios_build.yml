name: Build iOS IPA (Unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Resolve package dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Compile iOS Release Binary (No codesign required for sideloading)
      - name: Build iOS App Bundle
        run: flutter build ios --release --no-codesign

      # 6. Package compiled Runner.app into standard .ipa archive (preserving symlinks)
      - name: Package IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -y app-release.ipa Payload

      # 7. Upload the compiled .ipa artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamo-ios-release
          path: app-release.ipa
          retention-days: 7
